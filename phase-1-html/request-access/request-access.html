<section class="request-access">
    <div class="container">
        <div class="form-wrapper">
            <h2 class="section-title">Request Access</h2>
            <p class="section-description">Submit your company details to start using AfriBuildTrack</p>
            <form action="/api/request-access" method="POST">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="company">Company Name</label>
                    <input type="text" id="company" name="company" required>
                </div>
                <div class="form-group">
                    <label for="usecase">How do you plan to use AfriBuildTrack?</label>
                    <textarea name="usecase" id="usecase" rows="4"></textarea>
                </div>
                <button type="submit" class="submit-btn">Request Access</button>
            </form>
        </div>
    </div>
</section>
